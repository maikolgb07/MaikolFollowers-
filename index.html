<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaikolFollower | Agencia SMM Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --dark: #050505; --card: #111; }
        body { background-color: var(--dark); color: white; font-family: 'Poppins', sans-serif; }
        .gold-text { background: linear-gradient(135deg, #D4AF37, #F9E076); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gold-bg { background: linear-gradient(45deg, #D4AF37, #F9E076); }
        .service-card { background: var(--card); border: 1px solid #222; transition: 0.3s ease; }
        .service-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        select { background: #000; border: 1px solid #333; color: var(--gold); outline: none; }
    </style>
</head>
<body class="pb-20">

    <nav class="p-6 flex justify-between items-center border-b border-gray-900 sticky top-0 bg-black/80 backdrop-blur-md z-50">
        <h1 class="text-2xl font-black gold-text tracking-tighter">MAIKOLFOLLOWER</h1>
        <div id="ref-tag" class="text-[10px] border border-yellow-700 px-3 py-1 rounded-full text-yellow-600 uppercase font-bold">Carga Directa</div>
    </nav>

    <header class="py-16 px-6 text-center">
        <h2 class="text-4xl md:text-6xl font-black mb-4 uppercase">Domina las <br><span class="gold-text">Redes Sociales</span></h2>
        <p class="text-gray-500 text-sm max-w-md mx-auto">Selecciona tu plataforma y escala tu presencia digital con precios exclusivos para Cuba.</p>
    </header>

    <main id="catalog-grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 px-6">
        </main>

    <footer class="mt-20 text-center text-gray-700 text-xs">
        <p>© 2026 MaikolFollower - Cienfuegos, Cuba.</p>
        <button onclick="openAdmin()" class="mt-4 opacity-20 hover:opacity-100 transition">Panel Admin</button>
    </footer>

    <script src="config.js"></script>
    <script>
        // Lógica de Afiliados
        let affiliate = localStorage.getItem('mf_ref') || "Directo";
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('ref')) {
            affiliate = urlParams.get('ref');
            localStorage.setItem('mf_ref', affiliate);
        }
        document.getElementById('ref-tag').innerText = `Agente: ${affiliate}`;
        const multiplier = affiliate !== "Directo" ? 1.05 : 1.0;

        // Renderizado de Tienda
        function renderStore() {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = '';
            
            for (const [platform, data] of Object.entries(SERVICES_DATA)) {
                for (const [serviceName, levels] of Object.entries(data.items)) {
                    const card = document.createElement('div');
                    card.className = 'service-card p-8 rounded-3xl flex flex-col justify-between';
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-center mb-6">
                                <span class="text-3xl">${data.icon}</span>
                                <span class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">${platform}</span>
                            </div>
                            <h3 class="text-xl font-bold mb-6">${serviceName}</h3>
                            <select id="sel-${platform}-${serviceName}" class="w-full p-4 rounded-xl mb-8">
                                ${levels.map(l => `
                                    <option value="${l.q}" data-base="${l.p}">
                                        ${l.q.toLocaleString()} Unidades — $${Math.ceil(l.p * multiplier)} CUP
                                    </option>
                                `).join('')}
                            </select>
                        </div>
                        <button onclick="checkout('${platform}', '${serviceName}')" class="gold-bg w-full py-4 rounded-xl text-black font-black hover:scale-105 transition shadow-lg">
                            COMPRAR AHORA
                        </button>
                    `;
                    grid.appendChild(card);
                }
            }
        }

        function checkout(plat, serv) {
            const el = document.getElementById(`sel-${plat}-${serv}`);
            const qty = el.value;
            const price = Math.ceil(el.options[el.selectedIndex].dataset.base * multiplier);
            const method = confirm("¿Pagar por Transfermóvil? (Cancelar para Saldo Móvil)") ? "Transfermóvil" : "Saldo Móvil";
            
            const msg = `Hola Itashi, vengo de MaikolFollower.%0A%0A` +
                        `✅ *Servicio:* ${serv} (${plat})%0A` +
                        `📈 *Cantidad:* ${qty}%0A` +
                        `💰 *Total:* ${price} CUP%0A` +
                        `💳 *Método:* ${method}%0A` +
                        `🔗 *Referido:* ${affiliate}`;
            
            window.open(`https://wa.me/5353215857?text=${msg}`, '_blank');
        }

        function openAdmin() {
            const pass = prompt("Contraseña de Administrador:");
            if(pass === "maikol2026") window.location.href = "admin.html";
            else alert("Acceso Denegado");
        }

        window.onload = renderStore;
    </script>
</body>
</html>
